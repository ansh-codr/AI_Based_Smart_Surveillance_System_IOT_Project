<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Surveillance System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .dashboard {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.8rem;
    }

    .status {
      margin: 0 0 16px;
      font-weight: 600;
      color: #15803d;
    }

    .video {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #111827;
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <h1>Smart Surveillance System</h1>
    <p class="status">System Active</p>
    <img class="video" src="/video" alt="Live webcam feed" />
  </main>
</body>
</html>
