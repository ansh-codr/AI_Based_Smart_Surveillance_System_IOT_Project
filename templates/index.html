<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Surveillance System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .dashboard {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.8rem;
    }

    .status {
      margin: 0 0 6px;
      font-weight: 600;
      color: #0f766e;
    }

    .meta {
      margin: 0 0 16px;
      font-size: 0.95rem;
      color: #475569;
    }

    .video {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #111827;
    }

    .capture-block {
      margin-top: 18px;
      border-top: 1px solid #e5e7eb;
      padding-top: 16px;
    }

    .enroll-block {
      margin-top: 18px;
      border-top: 1px solid #e5e7eb;
      padding-top: 16px;
    }

    .enroll-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .enroll-input {
      min-width: 220px;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .enroll-btn {
      padding: 8px 12px;
      border: 0;
      border-radius: 8px;
      font-weight: 600;
      background: #0f766e;
      color: #ffffff;
      cursor: pointer;
    }

    .enroll-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .enroll-msg {
      margin: 10px 0 0;
      font-size: 0.92rem;
      color: #334155;
    }

    .capture-title {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    .capture {
      width: 100%;
      max-width: 360px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      display: none;
      background: #0f172a;
    }

    .capture-placeholder {
      margin: 0;
      color: #64748b;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <h1>Smart Surveillance System</h1>
    <p id="statusText" class="status">No Motion</p>
    <p id="meta" class="meta">Loading system status...</p>
    <img class="video" src="/video_feed" alt="Live camera feed" />

    <section class="capture-block">
      <h2 class="capture-title">Last Captured Intruder Image</h2>
      <p id="capturePlaceholder" class="capture-placeholder">No image captured yet.</p>
      <img id="lastCapture" class="capture" alt="Last intruder capture" />
    </section>

    <section class="enroll-block">
      <h2 class="capture-title">Enroll Unknown Person</h2>
      <p class="capture-placeholder">When an unknown face is detected, add name and enroll to dataset.</p>
      <div class="enroll-row">
        <input id="enrollName" class="enroll-input" type="text" placeholder="Enter person name" />
        <button id="enrollBtn" class="enroll-btn" type="button">Enroll to Database</button>
      </div>
      <p id="enrollMessage" class="enroll-msg"></p>
    </section>
  </main>

  <script>
    const statusTextEl = document.getElementById("statusText");
    const metaEl = document.getElementById("meta");
    const captureEl = document.getElementById("lastCapture");
    const capturePlaceholderEl = document.getElementById("capturePlaceholder");
    const enrollBtn = document.getElementById("enrollBtn");
    const enrollName = document.getElementById("enrollName");
    const enrollMessage = document.getElementById("enrollMessage");
    let canEnrollUnknown = false;

    async function refreshStatus() {
      try {
        const response = await fetch("/status", { cache: "no-store" });
        const data = await response.json();

        statusTextEl.textContent = data.status_text || "No Motion";
        metaEl.textContent = `Known faces: ${data.known_faces} | Camera: ${data.camera_ready ? "Ready" : "Error"} | GPIO: ${data.gpio_ready ? "Ready" : "Unavailable"}`;
        canEnrollUnknown = !!data.can_enroll_unknown;
        enrollBtn.disabled = !canEnrollUnknown;
        if (!canEnrollUnknown && !enrollMessage.textContent) {
          enrollMessage.textContent = "No recent unknown face available for enrollment.";
        }

        if (data.last_image) {
          captureEl.src = `${data.last_image}?t=${Date.now()}`;
          captureEl.style.display = "block";
          capturePlaceholderEl.style.display = "none";
        } else {
          captureEl.style.display = "none";
          capturePlaceholderEl.style.display = "block";
        }
      } catch (_err) {
        statusTextEl.textContent = "No Motion";
        metaEl.textContent = "Status unavailable";
      }
    }

    async function enrollUnknownPerson() {
      const name = enrollName.value.trim();
      if (!name) {
        enrollMessage.textContent = "Please enter a person name.";
        return;
      }
      if (!canEnrollUnknown) {
        enrollMessage.textContent = "Unknown face not available yet. Wait for detection.";
        return;
      }

      enrollBtn.disabled = true;
      enrollMessage.textContent = "Enrolling...";
      try {
        const response = await fetch("/enroll", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name })
        });
        const data = await response.json();

        if (!response.ok || !data.ok) {
          enrollMessage.textContent = data.message || "Enrollment failed.";
        } else {
          enrollMessage.textContent = `Enrolled ${name} successfully.`;
          enrollName.value = "";
        }
      } catch (_err) {
        enrollMessage.textContent = "Enrollment request failed.";
      }
      await refreshStatus();
    }

    enrollBtn.addEventListener("click", enrollUnknownPerson);

    refreshStatus();
    setInterval(refreshStatus, 1500);
  </script>
</body>
</html>
